name: CI — shfmt / shellcheck / bats

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck bats

      - name: shfmt (format check)
        uses: mvdan/shfmt@v3
        with:
          args: -l .

      - name: shellcheck (lint .sh files)
        run: |
          set -e
          FILES=$(git ls-files '*.sh' || true)
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs shellcheck -x
          else
            echo "No shell files to lint"
          fi

      - name: Run bats (if tests exist)
        run: |
          if [ -d tests ]; then
            bats -v tests
          else
            echo "No tests directory; skipping"
          fi
